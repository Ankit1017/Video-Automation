[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
  ".cache",
  ".git",
  ".pytest_cache",
  "__pycache__",
  "myEnv",
  "outputs",
]

[tool.ruff.lint]
select = ["E9", "F", "B"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"scripts/export_json_to_mongo.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = true
follow_imports = "skip"
files = [
  "app.py",
  "main_app/contracts.py",
  "main_app/constants.py",
  "main_app/services/agent_dashboard/intent_catalog.py",
  "main_app/services/agent_dashboard/asset_executor_registry.py",
  "main_app/services/global_grounding_service.py",
  "main_app/platform/web_sourcing",
  "scripts/check_import_cycles.py",
]
